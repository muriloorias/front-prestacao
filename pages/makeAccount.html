<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Crie a sua conta agora</title>
      <link rel="stylesheet" href="../styles/form.css">
</head>

<body>
      <header>
            <h1>Crie sua conta agora</h1>
      </header>
      <main>
            <div>
                  <form>
                        <label for="fname">Nome completo</label>
                        <input type="text" id="name" name="name" placeholder="Nome">

                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" placeholder="Email">

                        <label for="password">Senha</label>
                        <input type="password" name="password" id="password" placeholder="Senha">

                        <input type="button" value="Fazer login" onclick="window.location.href = '../pages/home.html'">
                  </form>
            </div>
      </main>
      <footer>
            <a href="../pages/Login.html" class="makeLogin">já tem uma conta? faça login!</a>
      </footer>
</body>

</html>
